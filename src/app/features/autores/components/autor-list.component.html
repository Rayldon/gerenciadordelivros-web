<div class="container mt-4">
  <h1 class="mb-4">Gerenciamento de Autores</h1>

  <div class="row">
    <div class="col-12 d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">Autores Cadastrados</h2>
      <a class="btn btn-primary" routerLink="/autores/novo">Incluir Autor</a>
    </div>
    <div class="col-12">
      @if (loading$ | async) {
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Carregando...</span>
        </div>
      } @else {
        @if (autores$ | async; as autores) {
          @if (autores.length > 0) {
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>Nome</th>
                </tr>
              </thead>
              <tbody>
                @for (autor of autores; track autor.nome) {
                  <tr>
                    <td>{{ autor.nome }}</td>
                  </tr>
                }
              </tbody>
            </table>
          } @else {
            <div class="alert alert-info">Nenhum autor cadastrado.</div>
          }
        }
      }
    </div> <!-- end col-12 content -->
  </div> <!-- end row -->
</div> <!-- end container -->
