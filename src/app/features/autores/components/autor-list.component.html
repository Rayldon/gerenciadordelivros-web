<div class="container mt-4">
  <h1 class="mb-4">Gerenciamento de Autores</h1>

  <div class="row">
    <div class="col-md-6">
      <app-autor-form></app-autor-form>
    </div>

    <div class="col-md-6">
      <h2>Autores Cadastrados</h2>
      @if (loading$ | async) {
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Carregando...</span>
        </div>
      } @else {
        @if (autores$ | async; as autores) {
          @if (autores.length > 0) {
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>Nome</th>
                </tr>
              </thead>
              <tbody>
                @for (autor of autores; track autor.nome) {
                  <tr>
                    <td>{{ autor.nome }}</td>
                  </tr>
                }
              </tbody>
            </table>
          } @else {
            <div class="alert alert-info">Nenhum autor cadastrado.</div>
          }
        }
      }
    </div>
  </div>
</div>
