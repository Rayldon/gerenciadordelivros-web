<div class="card">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Criar Novo Autor</h5>
  </div>
  <div class="card-body">
    @if (error$ | async) {
      <div class="alert alert-danger alert-dismissible fade show">
        {{ (error$ | async)?.message }}
        <button
          type="button"
          class="btn-close"
          (click)="clearError()"></button>
      </div>
    }

    <form [formGroup]="autorForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome *</label>
        <input
          type="text"
          class="form-control"
          id="nome"
          formControlName="nome"
          [class.is-invalid]="isNomeInvalid()" />
        @if (isNomeInvalid()) {
          <div class="invalid-feedback">
            Nome é obrigatório e não pode estar vazio
          </div>
        }
      </div>

      <div class="d-grid">
        <button
          type="submit"
          class="btn btn-success"
          [disabled]="!autorForm.valid || (loading$ | async)">
          @if (loading$ | async) {
            <span
              class="spinner-border spinner-border-sm me-2"
              role="status"
              aria-hidden="true"></span>
            Salvando...
          } @else {
            Salvar Autor
          }
        </button>
      </div>
    </form>
  </div>
</div>
