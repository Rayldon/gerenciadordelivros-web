<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card w-100" style="max-width: 500px;">
    <div class="card-body text-center">
      <h3 class="card-title">Relatório de Livros por Autor</h3>
      <p class="card-text">
        Clique no botão para gerar e abrir o PDF.
      </p>

      <button
        class="btn btn-primary"
        (click)="generate()"
        [disabled]="state === 'loading'">
        <span
          *ngIf="state === 'loading'"
          class="spinner-border spinner-border-sm me-2"
          role="status"></span>
        {{ state === 'loading' ? 'Gerando...' : 'Gerar PDF' }}
      </button>

      <div *ngIf="state === 'success'" class="alert alert-success mt-3">
        Relatório aberto em nova aba.
      </div>
      <div *ngIf="state === 'error'" class="alert alert-danger mt-3">
        {{ errorMessage }}
      </div>
    </div>
  </div>
</div>
